<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="pandaBg" cx="50%" cy="35%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#pandaBg)" stroke="#1a1a1a" stroke-width="3"/>
  <!-- ears -->
  <circle cx="26" cy="26" r="10" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="74" cy="26" r="10" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  <!-- eye patches -->
  <ellipse cx="38" cy="52" rx="9" ry="11" fill="#2a2a2a" transform="rotate(-12 38 52)"/>
  <ellipse cx="62" cy="52" rx="9" ry="11" fill="#2a2a2a" transform="rotate(12 62 52)"/>
  <!-- eyes -->
  <circle cx="39" cy="53" r="4" fill="#fff"/>
  <circle cx="61" cy="53" r="4" fill="#fff"/>
  <circle cx="39" cy="53" r="2.3" fill="#1a1a1a"/>
  <circle cx="61" cy="53" r="2.3" fill="#1a1a1a"/>
  <circle cx="40" cy="52" r="0.8" fill="#fff"/>
  <circle cx="62" cy="52" r="0.8" fill="#fff"/>
  <!-- nose -->
  <ellipse cx="50" cy="66" rx="4" ry="3" fill="#1a1a1a"/>
  <!-- mouth -->
  <path d="M50 69 L50 72" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M50 72 Q45 76 42 74" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M50 72 Q55 76 58 74" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle cx="28" cy="66" r="3.5" fill="#ffb5c0" opacity="0.6"/>
  <circle cx="72" cy="66" r="3.5" fill="#ffb5c0" opacity="0.6"/>
</svg>
