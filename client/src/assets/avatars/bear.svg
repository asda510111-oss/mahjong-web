<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bearBg" cx="50%" cy="35%">
      <stop offset="0%" stop-color="#c89a6a"/>
      <stop offset="100%" stop-color="#7a4a20"/>
