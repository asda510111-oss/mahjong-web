  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#bearBg)" stroke="#3a1e08" stroke-width="3"/>
  <!-- ears -->
  <circle cx="25" cy="25" r="9" fill="#7a4a20" stroke="#3a1e08" stroke-width="2.5"/>
  <circle cx="75" cy="25" r="9" fill="#7a4a20" stroke="#3a1e08" stroke-width="2.5"/>
  <circle cx="25" cy="26" r="5" fill="#d4a878"/>
  <circle cx="75" cy="26" r="5" fill="#d4a878"/>
